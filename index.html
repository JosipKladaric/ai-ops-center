<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Team Ops Center</title>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/activity.css">
    <link rel="stylesheet" href="css/repo.css">
    <link rel="stylesheet" href="css/canvas.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Fira+Code:wght@400;500&display=swap"
        rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
</head>

<body>
    <div id="app-container">
        <!-- Configuration Sidebar -->
        <aside class="sidebar left-sidebar">
            <div class="panel-title">
                <i data-lucide="settings"></i> Configuration
            </div>

            <div class="input-group">
                <label for="server-ip">Endpoint</label>
                <div style="display: flex; gap: 0.25rem;">
                    <input type="text" id="server-ip" value="http://localhost:11434">
                    <button class="btn btn-secondary" style="width: 40px;" id="test-connection" title="Test Connection">
                        <i data-lucide="zap" style="width: 14px;"></i>
                    </button>
                </div>
                <div id="connection-status" style="font-size: 0.65rem; margin-top: 0.25rem; display: none;"></div>
            </div>

            <div class="input-group">
                <label for="llm-model">Model</label>
                <input type="text" id="llm-model" value="gemini-3-flash-preview:cloud">
            </div>

            <div id="local-project-group" class="input-group" style="display: none;">
                <label for="project-name">Project Name</label>
                <div style="display: flex; gap: 0.25rem;">
                    <input type="text" id="project-name" placeholder="e.g. my-awesome-app" oninput="this.value = this.value.toLowerCase().replace(/[^a-z0-9-_]/g, '-')">
                </div>
            </div>

            <div id="web-folder-group" class="input-group" style="display: none;">
                <label>Project Workspace</label>
                <button id="select-folder" class="btn btn-secondary" style="width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem;">
                    <i data-lucide="folder-open" style="width: 16px;"></i>
                    Select Project Folder
                </button>
            </div>

            <div class="input-group" style="flex-grow: 1;">
                <label for="project-description">Mission</label>
                <textarea id="project-description" placeholder="Describe the project..."></textarea>
            </div>

            <div class="input-group">
                <label>Parameters</label>
                <div
                    style="background: rgba(0,0,0,0.1); padding: 0.75rem; border-radius: var(--radius-md); border: 1px solid var(--border-color);">
                    <div style="margin-bottom: 0.6rem;">
                        <div style="display: flex; justify-content: space-between;">
                            <label style="font-size: 0.7rem; margin:0;">Temp</label>
                            <span id="temp-val" style="font-size: 0.7rem; color: var(--accent-primary);">0.7</span>
                        </div>
                        <input type="range" id="llm-temp" min="0" max="1" step="0.1" value="0.7"
                            oninput="document.getElementById('temp-val').innerText = this.value">
                    </div>
                    <div style="display: flex; align-items: center; justify-content: space-between; padding-top: 0.5rem; border-top: 1px solid rgba(255,255,255,0.05);">
                        <label style="font-size: 0.7rem; margin:0;">Reasoning Mode</label>
                        <input type="checkbox" id="llm-think" checked style="width: 14px; height: 14px; cursor: pointer;">
                    </div>
                </div>
            </div>

            <div style="display: flex; gap: 0.5rem;">
                <button class="btn" id="start-mission" style="flex-grow: 1;">
                    <i data-lucide="play" style="width: 14px;"></i> Execute
                </button>
                <button class="btn btn-secondary" id="stop-mission" style="width: 40px; display: none;" title="Stop">
                    <i data-lucide="square" style="width: 14px; color: #ef4444;"></i>
                </button>
            </div>

            <button class="btn btn-secondary" id="reset-session"
                style="margin-top: 0.5rem; border: 1px dashed #ef444433; color: #ef4444; font-size: 0.7rem; padding: 6px 4px;">
                <i data-lucide="refresh-ccw" style="width: 14px;"></i> Reset Session
            </button>

            <!-- Mission Archive -->
            <div style="margin-top: 1.25rem;">
                <div
                    style="font-size: 0.65rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 0.5rem; letter-spacing: 0.08em;">
                    Mission Archive</div>
                <div id="mission-archive" class="mission-archive"></div>
            </div>
        </aside>

        <!-- Operation Center -->
        <main class="main-content">
            <!-- Read-Only Banner -->
            <div id="readonly-banner"
                style="display:none; background: rgba(99,102,241,0.1); border: 1px solid #6366f155; border-radius: var(--radius-md); padding: 8px 14px; margin-bottom: 1rem; display: none; justify-content: space-between; align-items: center;">
                <span style="font-size: 0.75rem; color: #6366f1;">📁 READ-ONLY — <span
                        id="readonly-title"></span></span>
                <button onclick="window.aiTeam.exitReadOnly()" class="btn btn-secondary"
                    style="font-size: 0.65rem; padding: 3px 10px; width: auto;">Exit</button>
            </div>

            <!-- 1. Mission Roadmap (Integrated Top) -->
            <div id="mission-canvas-container" style="display: none; margin-bottom: 2rem;">
                <div class="mission-canvas">
                    <h2><i data-lucide="list-checks" style="width: 18px; height: 18px;"></i> Mission Roadmap</h2>
                    <div id="mission-canvas-content"></div>
                </div>
            </div>

            <!-- 2. Status Banner -->
            <div id="status-banner"
                style="display:none; border-radius: var(--radius-md); padding: 10px 16px; margin-bottom: 1.5rem; font-size: 0.8rem; font-weight: 600; border: 1px solid;">
            </div>

            <!-- 3. The Team Header -->
            <div style="margin-bottom: 1rem; display: flex; align-items: center; gap: 0.75rem;">
                <div style="font-size: 0.7rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em;">The Team</div>
                <div id="local-engine-pill" style="display:none; background: rgba(16, 185, 129, 0.1); border: 1px solid #10b98155; color: #10b981; font-size: 0.6rem; font-weight: 700; padding: 2px 8px; border-radius: 20px; letter-spacing: 0.05em;">LOCAL ENGINE</div>
                <button class="btn-icon" id="edit-comm-rules" title="Communication Rules" style="width: 24px; height: 24px; border: none; background: rgba(255,255,255,0.03);">
                    <i data-lucide="message-square-quote" style="width: 12px;"></i>
                </button>
                <div style="flex-grow: 1; height: 1px; background: var(--border-color); opacity: 0.3;"></div>
            </div>
            
            <div id="team-grid" class="agent-grid"></div>
        </main>

        <!-- Developer Console -->
        <aside class="sidebar right-sidebar">
            <div
                style="display: flex; gap: 1rem; margin-bottom: 0.75rem; border-bottom: 1px solid var(--border-color); padding-bottom: 0.5rem; flex-shrink: 0;">
                <button class="tab-btn active" data-tab="activity">Activity</button>
                <button class="tab-btn" data-tab="repo">Repository <span id="workspace-badge"
                        style="width: 6px; height: 6px; background: var(--accent-primary); border-radius: 50%; display: none; margin-left: 4px; vertical-align: middle;"></span></button>
            </div>

            <div id="activity-tab" class="console-tab active">
                <div id="log-feed"></div>
            </div>

            <div id="repo-tab" class="console-tab">
                <div class="repo-container">
                    <div class="repo-sidebar">
                        <div id="file-tree" class="file-tree"></div>
                        <div style="display: flex; gap: 0.25rem; margin-top: 1rem;">
                            <button class="btn btn-secondary" id="download-btn" style="flex: 1; font-size: 0.6rem; padding: 6px 4px;">
                                <i data-lucide="download" style="width: 12px;"></i> File
                            </button>
                            <button class="btn btn-secondary" id="download-project-btn" style="flex: 1; font-size: 0.6rem; padding: 6px 4px;">
                                <i data-lucide="package" style="width: 12px;"></i> Project
                            </button>
                        </div>
                    </div>
                    <div class="repo-viewer">
                        <div class="repo-header">
                            <i data-lucide="file-code" style="width: 14px; color: var(--accent-primary);"></i>
                            <span id="active-filename"
                                style="font-family: 'Fira Code', monospace; font-size: 0.7rem;">Select a file...</span>
                        </div>
                        <div id="code-display" class="code-display">
                            <pre><code id="code-content"></code></pre>
                        </div>
                    </div>
                </div>
            </div>
        </aside>
    </div>

    <!-- Prompt Editor Modal -->
    <div id="prompt-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);">
        <div
            style="background: var(--card-bg); width: 90%; max-width: 520px; padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 id="modal-agent-name">Edit Agent Brain</h3>
                <button id="close-modal"
                    style="border:none; background:transparent; color:var(--text-muted); font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <label style="font-size: 0.75rem; color: var(--text-muted);">System Prompt</label>
            <textarea id="modal-prompt-text"
                style="height: 260px; margin-top: 0.5rem; width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border-color); color:white; padding:0.75rem; font-family: 'Fira Code', monospace; font-size: 0.75rem; border-radius: var(--radius-md);"></textarea>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button class="btn" id="save-prompt" style="flex: 1;">Save Changes</button>
            </div>
        </div>
    </div>

    <!-- Communication Rules Modal -->
    <div id="comm-rules-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);">
        <div
            style="background: var(--card-bg); width: 90%; max-width: 520px; padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="display: flex; align-items: center; gap: 0.5rem;"><i data-lucide="message-square-quote" style="width: 20px; color: var(--accent-primary);"></i> Communication Rules</h3>
                <button id="close-comm-rules"
                    style="border:none; background:transparent; color:var(--text-muted); font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <div style="margin-bottom: 1rem; font-size: 0.75rem; color: var(--text-muted); line-height: 1.4;">
                These rules are automatically appended to every agent's system prompt. Use this to define global behavior, tone, or formatting rules.
            </div>
            <textarea id="comm-rules-text" placeholder="e.g. Always be professional. Use emojis sparingly. Mention the file name in every message..."
                style="height: 260px; width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border-color); color:white; padding:0.75rem; font-family: 'Fira Code', monospace; font-size: 0.75rem; border-radius: var(--radius-md);"></textarea>
            <div style="display: flex; justify-content: flex-end; gap: 0.5rem; margin-top: 1rem;">
                <button class="btn btn-secondary" id="reset-comm-rules">Reset to Default</button>
                <button class="btn btn-primary" id="save-comm-rules">Save Rules</button>
            </div>
        </div>
    </div>

    <script type="module" src="app.js"></script>
    <script>lucide.createIcons();</script>

    <!-- Add Agent Modal -->
    <div id="add-agent-modal"
        style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1001; align-items: center; justify-content: center; -webkit-backdrop-filter: blur(4px); backdrop-filter: blur(4px);">
        <div
            style="background: var(--card-bg); width: 90%; max-width: 520px; padding: 1.5rem; border-radius: var(--radius-lg); border: 1px solid var(--border-color); box-shadow: 0 20px 60px rgba(0,0,0,0.6);">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h3 style="display:flex; align-items:center; gap:0.5rem;"><span
                        style="color:var(--accent-primary);">+</span> New Agent</h3>
                <button onclick="document.getElementById('add-agent-modal').style.display='none'"
                    style="border:none; background:transparent; color:var(--text-muted); font-size:1.5rem; cursor:pointer; line-height:1;">&times;</button>
            </div>
            <div class="input-group" style="margin-bottom: 0.75rem;">
                <label style="font-size: 0.75rem; color: var(--text-muted);">Name *</label>
                <input type="text" id="new-agent-name" placeholder="e.g. Aria" style="margin-top:0.25rem;">
            </div>
            <div style="display:flex; gap:0.75rem; margin-bottom: 0.75rem;">
                <div class="input-group" style="flex:1; margin-bottom:0;">
                    <label style="font-size: 0.75rem; color: var(--text-muted);">Role</label>
                    <input type="text" id="new-agent-role" placeholder="e.g. DevOps Engineer"
                        style="margin-top:0.25rem;">
                </div>
                <div class="input-group" style="flex:1; margin-bottom:0;">
                    <label style="font-size: 0.75rem; color: var(--text-muted);">Description</label>
                    <input type="text" id="new-agent-desc" placeholder="e.g. Handles CI/CD" style="margin-top:0.25rem;">
                </div>
            </div>
            <label style="font-size: 0.75rem; color: var(--text-muted);">System Prompt *</label>
            <textarea id="new-agent-prompt" placeholder="Describe the agent's personality, expertise, and behavior..."
                style="height: 200px; margin-top: 0.5rem; width:100%; background:rgba(0,0,0,0.3); border:1px solid var(--border-color); color:white; padding:0.75rem; font-family: 'Fira Code', monospace; font-size: 0.75rem; border-radius: var(--radius-md);"></textarea>
            <div style="display: flex; gap: 0.5rem; margin-top: 1rem;">
                <button class="btn" onclick="saveNewAgent()" style="flex: 1;">Create Agent</button>
                <button class="btn btn-secondary"
                    onclick="document.getElementById('add-agent-modal').style.display='none'"
                    style="flex: 0.5;">Cancel</button>
            </div>
        </div>
    </div>
</body>

</html>
